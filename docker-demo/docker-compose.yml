# docker-compose.yml
# Runs the security audit dashboard with logs mounted from the host
version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ../logs:/app/logs:ro
    environment:
      - LOG_DIR=/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
