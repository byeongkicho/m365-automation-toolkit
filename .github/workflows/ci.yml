name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Note: ubuntu-latest runners ship with PowerShell 7.x pre-installed.
# `shell: pwsh` is sufficient; no separate setup-powershell action needed.

jobs:
  syntax-check:
    name: PowerShell Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse all .ps1 files
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $e = $null; $t = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$t, [ref]$e)
            if ($e.Count -gt 0) {
              Write-Host "FAIL $($_.Name): $($e[0].Message)" -ForegroundColor Red
              $failed = $true
            } else {
              Write-Host "OK   $($_.Name)" -ForegroundColor Green
            }
          }
          if ($failed) { exit 1 }

  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Run linter
        shell: pwsh
        run: |
          $excluded = @(
            'PSAvoidUsingWriteHost',
            'PSUseShouldProcessForStateChangingFunctions'
          )
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -ExcludeRule $excluded
          if ($results) {
            $results | Format-Table -AutoSize
            $errors = @($results | Where-Object Severity -eq 'Error')
            if ($errors.Count -gt 0) {
              Write-Host "::error::$($errors.Count) PSScriptAnalyzer error(s)"
              exit 1
            }
            Write-Host "::warning::$($results.Count) PSScriptAnalyzer warning(s) (non-blocking)"
          } else {
            Write-Host "::notice::No PSScriptAnalyzer issues"
          }

  test:
    name: Pester Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -MaximumVersion 5.999 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run Pester
        shell: pwsh
        run: |
          if (-not (Test-Path ./tests)) {
            Write-Host "::warning::No tests/ directory yet — skipping"
            exit 0
          }
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Throw = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults.xml'
          Invoke-Pester -Configuration $config
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xml
          if-no-files-found: ignore
